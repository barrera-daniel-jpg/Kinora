<!--
  Vista de Coaches (solo para el rol admin).
  Se inyecta como fragmento dentro de <div id="app"> desde el router.
-->
<div class="athletes-page">
  <div class="athletes-inner">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2>Gestión de Coaches</h2>
      <button id="btn-show-create-coach" class="btn">+ Nuevo Coach</button>
    </div>

    <div id="coach-form-container" class="card" style="display: none;">
      <h3 id="coach-form-title">Crear Coach</h3>

      <form id="coach-form">
        <input type="hidden" id="coach-id">

        <h4 style="margin: 0.5rem 0 0.8rem;">Datos básicos</h4>

        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="coach-name" placeholder="Ej. Daniel Barrera" required>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" id="coach-phone" placeholder="Ej. 300 123 4567">
        </div>

        <h4 style="margin: 1.2rem 0 0.8rem;">Datos de usuario (credenciales de acceso)</h4>

        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" id="coach-username" placeholder="Ej. daniel" required>
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="coach-email" placeholder="coach@correo.com">
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="coach-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>

        <button type="submit" class="btn">Guardar coach</button>
        <button type="button" id="btn-cancel-coach" class="btn btn-danger">Cancelar</button>
      </form>
    </div>

    <div class="project-grid" id="coaches-list"></div>
  </div>
</div>
